name: tests

on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR branch cancels the previous, still-running test job.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        # No LLM keys are configured, so the key-gated live tests skip cleanly
        # and the runner's clean HOME has no llm.yaml, so model-default tests
        # fall back to the in-repo DEFAULT_MODELS. The suite is hermetic.
        run: python -m pytest -v --tb=short

  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run frontend tests
        run: npm run test
